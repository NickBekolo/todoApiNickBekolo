services:
  api:
    image: node:18-alpine
    command: sh -c "while true; do sleep 3600; done"
    networks:
      - frontend
      - backend
    ports:
      - "3000:3000"

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
    networks:
      - backend

  nginx:
    image: nginx:alpine
    networks:
      - frontend
    ports:
      - "80:80"

networks:
  frontend:
  backend:
